name: Loop
options:
  bundleIdPrefix: com.loop
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_BITCODE: NO

targets:
  Loop:
    type: application
    platform: iOS
    sources:
      - path: Loop
    info:
      path: Loop/Info.plist
      properties:
        CFBundleDisplayName: Loop
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSMicrophoneUsageDescription: "Loop needs microphone access to record audio loops."
        UIBackgroundModes:
          - audio
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen:
          UIColorName: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.loop.app
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
