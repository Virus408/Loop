name: Loop
options:
  bundleIdPrefix: com.loop
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_BITCODE: NO
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO

targets:
  Loop:
    type: application
    platform: iOS
    sources:
      - path: Loop
        excludes:
          - "Info.plist"
    info:
      path: Loop/Info.plist
      properties:
        CFBundleDisplayName: Loop
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSMicrophoneUsageDescription: "Loop needs microphone access to record audio loops."
        UIBackgroundModes:
          - audio
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.loop.app
        GENERATE_INFOPLIST_FILE: NO

schemes:
  Loop:
    build:
      targets:
        Loop: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
